spring.application.name=studybuddy-ai

# Database - uses environment variables if set (for deployment), otherwise
# falls back to local defaults so it works out of the box on your laptop
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/studybuddy}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# File upload limits
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# JWT
app.jwt.secret=${JWT_SECRET:changeThisToALongRandomSecretKeyInProductionEnvironment}
app.jwt.expiration-ms=86400000

# Groq - free cloud LLM API for chat (replaces local Ollama llama3.2)
app.groq.base-url=https://api.groq.com/openai/v1
app.groq.chat-model=llama-3.3-70b-versatile
app.groq.api-key=${GROQ_API_KEY:}

# Gemini - free cloud embedding API (replaces local Ollama nomic-embed-text)
app.gemini.base-url=https://generativelanguage.googleapis.com
app.gemini.embedding-model=gemini-embedding-001
app.gemini.api-key=${GEMINI_API_KEY:}

# Mail (for revision reminders) - optional, fill in if you want email alerts
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

server.port=8080
