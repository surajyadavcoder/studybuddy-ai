spring.application.name=studybuddy-ai

# Database - uses environment variables if set (for deployment), otherwise
# falls back to local defaults so it works out of the box on your laptop
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/studybuddy}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# File upload limits
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# JWT
app.jwt.secret=${JWT_SECRET:changeThisToALongRandomSecretKeyInProductionEnvironment}
app.jwt.expiration-ms=86400000

# Ollama - runs locally, completely free, no API key needed
# Make sure Ollama is running (ollama serve, or the desktop app) and these
# models have been pulled: ollama pull nomic-embed-text / ollama pull llama3.2
app.ollama.base-url=http://localhost:11434
app.ollama.embedding-model=nomic-embed-text
app.ollama.chat-model=llama3.2

# Mail (for revision reminders) - optional, fill in if you want email alerts
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

server.port=8080
